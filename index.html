<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎰 幸运转盘</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#0d0015 0%,#1a0030 40%,#0a0a2e 70%,#050520 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:20px 16px 40px;
  overflow-x:hidden;
  color:#fff;
}
.app-title{
  font-size:clamp(28px,7vw,48px);
  font-weight:800;
  text-align:center;
  margin:10px 0 6px;
  background:linear-gradient(135deg,#ffd700,#ff8c00,#ffd700);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:0 0 40px rgba(255,200,0,0.3);
  letter-spacing:2px;
}
.sub-title{
  font-size:13px;
  color:rgba(255,255,255,0.4);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:20px;
}
.wheel-container{
  position:relative;
  margin:10px auto;
  display:flex;
  align-items:center;
  justify-content:center;
}
canvas#wheel{
  max-width:100%;
  cursor:pointer;
  filter:drop-shadow(0 0 30px rgba(255,150,0,0.3));
}
.pointer{
  position:absolute;
  top:-8px;
  left:50%;
  transform:translateX(-50%);
  width:36px;
  height:44px;
  z-index:10;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  pointer-events:none;
}
.pointer svg{width:100%;height:100%}
.btn-row{
  display:flex;
  gap:12px;
  margin-top:20px;
  flex-wrap:wrap;
  justify-content:center;
}
.btn{
  padding:14px 32px;
  border:none;
  border-radius:50px;
  font-family:'Outfit',sans-serif;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  overflow:hidden;
  letter-spacing:0.5px;
}
.btn::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:inherit;
  opacity:0;
  transition:opacity 0.3s;
  background:rgba(255,255,255,0.15);
}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(0.96)}
.btn-primary{
  background:linear-gradient(135deg,#ff6b35,#ff2d55);
  color:#fff;
  box-shadow:0 6px 30px rgba(255,45,85,0.4);
  font-size:18px;
  padding:16px 48px;
}
.btn-primary:hover{box-shadow:0 8px 40px rgba(255,45,85,0.6)}
.btn-primary:disabled{
  background:linear-gradient(135deg,#555,#333);
  box-shadow:none;
  cursor:not-allowed;
}
.btn-secondary{
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.85);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
}
.btn-secondary:hover{background:rgba(255,255,255,0.14)}
.btn-sm{
  padding:8px 18px;
  font-size:13px;
}
.result-bar{
  margin-top:16px;
  text-align:center;
  min-height:60px;
}
.last-result{
  font-size:14px;
  color:rgba(255,255,255,0.4);
  margin-bottom:4px;
}
.winner-text{
  font-size:clamp(18px,5vw,26px);
  font-weight:700;
  color:#ffd700;
  min-height:32px;
  text-shadow:0 0 20px rgba(255,215,0,0.5);
  animation:fadeInUp 0.5s ease;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.history-section{
  width:100%;
  max-width:500px;
  margin-top:24px;
}
.history-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
.history-title{
  font-size:14px;
  color:rgba(255,255,255,0.5);
  letter-spacing:2px;
  text-transform:uppercase;
}
.history-list{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  overflow:hidden;
  max-height:200px;
  overflow-y:auto;
}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
.history-empty{
  padding:20px;
  text-align:center;
  color:rgba(255,255,255,0.3);
  font-size:13px;
}
.history-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:13px;
  animation:fadeInUp 0.3s ease;
}
.history-item:last-child{border-bottom:none}
.history-item .label{color:#ffd700;font-weight:600}
.history-item .time{color:rgba(255,255,255,0.35);font-size:11px}

/* Modal */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s;
  padding:20px;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:linear-gradient(145deg,#1a0a30,#0d0020);
  border:1px solid rgba(255,200,0,0.2);
  border-radius:24px;
  padding:32px 24px;
  width:100%;
  max-width:420px;
  max-height:90vh;
  overflow-y:auto;
  transform:scale(0.9);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 40px rgba(255,150,0,0.1);
}
.modal-overlay.active .modal{transform:scale(1)}
.modal-title{
  font-size:20px;
  font-weight:700;
  color:#ffd700;
  margin-bottom:20px;
  text-align:center;
}
.segment-list{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:16px;
}
.segment-item{
  display:flex;
  align-items:center;
  gap:8px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:8px 12px;
}
.segment-color{
  width:28px;
  height:28px;
  border-radius:50%;
  flex-shrink:0;
  border:2px solid rgba(255,255,255,0.15);
  cursor:pointer;
}
.segment-input{
  flex:1;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:8px;
  padding:7px 10px;
  color:#fff;
  font-family:'Outfit',sans-serif;
  font-size:14px;
  outline:none;
  transition:border 0.2s;
}
.segment-input:focus{border-color:rgba(255,200,0,0.5)}
.segment-del{
  background:none;
  border:none;
  color:rgba(255,100,100,0.6);
  font-size:18px;
  cursor:pointer;
  padding:4px 6px;
  border-radius:6px;
  transition:all 0.2s;
  line-height:1;
}
.segment-del:hover{background:rgba(255,0,0,0.15);color:#ff6b6b}
.color-palette{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:16px;
}
.color-palette-label{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:6px;display:block}
.color-opt{
  width:26px;
  height:26px;
  border-radius:50%;
  cursor:pointer;
  border:2px solid transparent;
  transition:all 0.2s;
}
.color-opt:hover,.color-opt.selected{border-color:#fff;transform:scale(1.2)}
.add-segment-btn{
  width:100%;
  padding:10px;
  background:rgba(255,200,0,0.1);
  border:1px dashed rgba(255,200,0,0.3);
  border-radius:10px;
  color:#ffd700;
  font-family:'Outfit',sans-serif;
  font-size:14px;
  cursor:pointer;
  margin-bottom:20px;
  transition:all 0.2s;
}
.add-segment-btn:hover{background:rgba(255,200,0,0.18)}
.modal-actions{
  display:flex;
  gap:10px;
}
.modal-actions .btn{flex:1}

/* Result Modal */
.result-modal{
  text-align:center;
}
.result-modal .modal-title{font-size:16px;color:rgba(255,255,255,0.6);margin-bottom:4px;letter-spacing:2px;text-transform:uppercase}
.result-winner{
  font-size:clamp(28px,8vw,44px);
  font-weight:800;
  color:#ffd700;
  margin:10px 0 24px;
  text-shadow:0 0 30px rgba(255,215,0,0.6);
  animation:winnerPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes winnerPop{
  0%{transform:scale(0);opacity:0}
  60%{transform:scale(1.1)}
  100%{transform:scale(1);opacity:1}
}
.result-modal .btn{width:100%}

/* Confetti */
.confetti-piece{
  position:fixed;
  top:-10px;
  pointer-events:none;
  z-index:2000;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.flash-overlay{
  position:fixed;
  inset:0;
  background:rgba(255,215,0,0.15);
  pointer-events:none;
  z-index:999;
  animation:flashAnim 0.6s ease-out forwards;
}
@keyframes flashAnim{
  0%{opacity:1}
  100%{opacity:0}
}
.shake{
  animation:shakeAnim 0.5s ease-out;
}
@keyframes shakeAnim{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
@media(max-width:400px){
  .btn{padding:12px 24px;font-size:15px}
  .btn-primary{padding:14px 36px}
}
</style>
</head>
<body>
<div class="app-title">🎰 幸运转盘</div>
<div class="sub-title">LUCKY WHEEL</div>

<div class="wheel-container" id="wheelContainer">
  <div class="pointer">
    <svg viewBox="0 0 40 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ptrGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffd700"/>
          <stop offset="50%" stop-color="#ff8c00"/>
          <stop offset="100%" stop-color="#e65100"/>
        </linearGradient>
        <filter id="ptrShadow">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
      </defs>
      <polygon points="20,56 4,8 20,16 36,8" fill="url(#ptrGrad)" filter="url(#ptrShadow)"/>
      <polygon points="20,56 8,12 20,18 32,12" fill="rgba(255,255,255,0.15)"/>
      <circle cx="20" cy="20" r="5" fill="#ffd700"/>
      <circle cx="20" cy="20" r="3" fill="#fff"/>
    </svg>
  </div>
  <canvas id="wheel" width="360" height="360"></canvas>
</div>

<div class="btn-row">
  <button class="btn btn-primary" id="spinBtn" onclick="startSpin()">🎯 开始抽奖</button>
  <button class="btn btn-secondary" onclick="openEditModal()">✏️ 编辑奖项</button>
</div>

<div class="result-bar">
  <div class="last-result">最近中奖</div>
  <div class="winner-text" id="winnerText">— 点击开始抽奖 —</div>
</div>

<div class="history-section">
  <div class="history-header">
    <span class="history-title">🎉 中奖记录</span>
    <button class="btn btn-secondary btn-sm" onclick="clearHistory()" id="clearBtn">清空</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">暂无记录</div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ 编辑奖项</div>
    <div class="segment-list" id="segmentList"></div>
    <div class="color-palette-label">选择颜色</div>
    <div class="color-palette" id="colorPalette"></div>
    <button class="add-segment-btn" onclick="addSegment()">+ 添加奖项</button>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSegments()">保存</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal result-modal">
    <div class="modal-title">🎉 恭喜您</div>
    <div class="result-winner" id="resultWinner"></div>
    <button class="btn btn-primary" onclick="closeResultModal()">太棒了！</button>
  </div>
</div>

<script>
// === Data ===
const DEFAULT_SEGMENTS = [
  {label:'一等奖',color:'#FF6B6B'},
  {label:'二等奖',color:'#4ECDC4'},
  {label:'三等奖',color:'#FFD93D'},
  {label:'谢谢参与',color:'#6C5CE7'},
  {label:'再来一次',color:'#FD79A8'},
  {label:'幸运奖',color:'#00B894'},
  {label:'特等奖',color:'#E17055'},
  {label:'安慰奖',color:'#74B9FF'},
];

const PALETTE = [
  '#FF6B6B','#FF8E53','#FFD93D','#6BCB77','#4D96FF',
  '#C77DFF','#FF6B9D','#00C9A7','#845EC2','#FFC75F',
  '#F9F871','#2D00F7','#FF4B4B','#00D4AA','#FF9F1C',
  '#CBF3F0','#FF99C8','#F0A6CA','#8ECAE6','#FB8500',
];

let segments = JSON.parse(localStorage.getItem('wheelSegments')) || DEFAULT_SEGMENTS;
let history = JSON.parse(localStorage.getItem('wheelHistory')) || [];
let isSpinning = false;
let currentAngle = 0;
let selectedColor = null;
let editSegments = [];

// Audio
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTick(){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  }catch(e){}
}
let lastTickAngle = 0;

// Canvas
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const SIZE = 360;
const CX = SIZE/2, CY = SIZE/2;
const RADIUS = SIZE/2 - 8;

function drawWheel(angle){
  const segCount = segments.length;
  const sweep = (2*Math.PI)/segCount;
  ctx.clearRect(0,0,SIZE,SIZE);
  
  // Outer ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX,CY,RADIUS+2,0,2*Math.PI);
  ctx.fillStyle='rgba(255,215,0,0.3)';
  ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.8)';
  ctx.lineWidth=3;
  ctx.stroke();
  ctx.restore();
  
  // Segments
  segments.forEach((seg,i)=>{
    const start = angle + i*sweep - Math.PI/2;
    const end = start + sweep;
    
    // Slice
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,RADIUS-2,start,end);
    ctx.closePath();
    
    // Gradient fill
    const grad = ctx.createRadialGradient(CX,CY,0,CX,CY,RADIUS);
    const col = hexToRgb(seg.color);
    grad.addColorStop(0,`rgba(${col.r},${col.g},${col.b},0.9)`);
    grad.addColorStop(1,`rgba(${col.r},${col.g},${col.b},0.6)`);
    ctx.fillStyle=grad;
    ctx.fill();
    
    // Border
    ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.lineWidth=1.5;
    ctx.stroke();
    
    // Divider
    ctx.beginPath();
    ctx.moveTo(CX,CY);
    ctx.lineTo(CX+RADIUS*Math.cos(start),CY+RADIUS*Math.sin(start));
    ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.lineWidth=1;
    ctx.stroke();
    
    // Label
    const mid = start + sweep/2;
    const lr = RADIUS*0.62;
    const lx = CX + lr*Math.cos(mid);
    const ly = CY + lr*Math.sin(mid);
    ctx.save();
    ctx.translate(lx,ly);
    ctx.rotate(mid+Math.PI/2);
    ctx.font=`bold ${Math.max(11,14-seg.label.length*0.5)}px 'Outfit',sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.95)';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=4;
    // Wrap label
    const label = seg.label;
    const chars = label.length;
    if(chars<=4){
      ctx.fillText(label,0,0);
    } else {
      const half=Math.ceil(chars/2);
      ctx.fillText(label.slice(0,half),0,-9);
      ctx.fillText(label.slice(half),0,9);
    }
    ctx.restore();
  });
  
  // Center circle
  const cGrad = ctx.createRadialGradient(CX-8,CY-8,0,CX,CY,28);
  cGrad.addColorStop(0,'#fff');
  cGrad.addColorStop(40,'#ffd700');
  cGrad.addColorStop(100,'#b8860b');
  ctx.beginPath();
  ctx.arc(CX,CY,26,0,2*Math.PI);
  ctx.fillStyle=cGrad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=2;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(CX,CY,12,0,2*Math.PI);
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.fill();
}

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// Responsive canvas
function resizeCanvas(){
  const container = document.getElementById('wheelContainer');
  const size = Math.min(container.offsetWidth, 360);
  canvas.style.width = size+'px';
  canvas.style.height = size+'px';
}

// Spin
function startSpin(){
  if(isSpinning) return;
  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  
  const segCount = segments.length;
  const sweep = (2*Math.PI)/segCount;
  const minSpins = 4 + Math.random()*3;
  const extra = Math.random()*sweep;
  const targetRotations = minSpins*2*Math.PI;
  const targetAngle = currentAngle + targetRotations + (2*Math.PI - (currentAngle%sweep) + extra);
  
  const duration = 5000 + Math.random()*2000;
  const startTime = performance.now();
  const startAngle = currentAngle;
  let lastSeg = -1;
  
  lastTickAngle = startAngle;
  
  function easeOutQuart(t){
    return 1 - Math.pow(1-t, 4);
  }
  
  function animate(now){
    const elapsed = now - startTime;
    const progress = Math.min(elapsed/duration,1);
    const eased = easeOutQuart(progress);
    
    currentAngle = startAngle + (targetAngle - startAngle)*eased;
    drawWheel(currentAngle);
    
    // Tick sound
    const seg = Math.floor(((currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI)/sweep);
    if(seg !== lastSeg && progress<0.92){
      playTick();
      lastSeg = seg;
    }
    
    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      // Done
      const finalAngle = currentAngle%(2*Math.PI);
      const pointerAngle = (2*Math.PI - finalAngle)%(2*Math.PI);
      const winnerIdx = Math.floor(pointerAngle/sweep)%segCount;
      const winner = segments[winnerIdx];
      
      // Flash
      const flash = document.createElement('div');
      flash.className='flash-overlay';
      document.body.appendChild(flash);
      setTimeout(()=>flash.remove(),600);
      
      // Shake
      document.getElementById('wheelContainer').classList.add('shake');
      setTimeout(()=>document.getElementById('wheelContainer').classList.remove('shake'),500);
      
      // Confetti
      spawnConfetti();
      
      // Show result
      setTimeout(()=>{
        showResult(winner);
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
      },400);
    }
  }
  requestAnimationFrame(animate);
}

function showResult(winner){
  document.getElementById('winnerText').textContent = winner.label;
  document.getElementById('winnerText').style.color = winner.color;
  document.getElementById('resultWinner').textContent = winner.label;
  document.getElementById('resultWinner').style.color = winner.color;
  document.getElementById('resultModal').classList.add('active');
  
  // Add to history
  const entry = {
    label:winner.label,
    color:winner.color,
    time:new Date().toLocaleString('zh-CN')
  };
  history.unshift(entry);
  if(history.length>20) history.pop();
  localStorage.setItem('wheelHistory',JSON.stringify(history));
  renderHistory();
}

function closeResultModal(){
  document.getElementById('resultModal').classList.remove('active');
}

function spawnConfetti(){
  const colors=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF8E53','#C77DFF','#FD79A8','#00B894'];
  for(let i=0;i<60;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      const size=6+Math.random()*10;
      el.style.cssText=`
        left:${Math.random()*100}vw;
        width:${size}px;
        height:${size*0.6}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        border-radius:${Math.random()>0.5?'50%':'2px'};
        animation-duration:${1.5+Math.random()*2}s;
        animation-delay:0s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    },Math.random()*300);
  }
}

// History
function renderHistory(){
  const list = document.getElementById('historyList');
  if(history.length===0){
    list.innerHTML='<div class="history-empty">暂无记录</div>';
    return;
  }
  list.innerHTML=history.map((h,i)=>`
    <div class="history-item" style="animation-delay:${i*30}ms">
      <span class="label" style="color:${h.color}">● ${h.label}</span>
      <span class="time">${h.time}</span>
    </div>
  `).join('');
}

function clearHistory(){
  if(history.length===0) return;
  history=[];
  localStorage.setItem('wheelHistory',JSON.stringify(history));
  renderHistory();
}

// Edit Modal
function openEditModal(){
  editSegments = segments.map(s=>({...s}));
  renderSegmentList();
  renderColorPalette();
  document.getElementById('editModal').classList.add('active');
}
function closeEditModal(e){
  if(e && e.target!==e.currentTarget) return;
  document.getElementById('editModal').classList.remove('active');
}
function renderSegmentList(){
  const list = document.getElementById('segmentList');
  list.innerHTML=editSegments.map((s,i)=>`
    <div class="segment-item">
      <div class="segment-color" style="background:${s.color}" onclick="pickColor(${i})"></div>
      <input class="segment-input" value="${s.label}" oninput="editSegments[${i}].label=this.value" placeholder="奖项名称">
      <button class="segment-del" onclick="delSegment(${i})" ${editSegments.length<=1?'disabled':''}>×</button>
    </div>
  `).join('');
}
function renderColorPalette(){
  const pal = document.getElementById('colorPalette');
  pal.innerHTML=PALETTE.map(c=>`
    <div class="color-opt ${selectedColor===c?'selected':''}" style="background:${c}" onclick="selectedColor='${c}';renderColorPalette()"></div>
  `).join('');
}
function pickColor(i){
  if(selectedColor){
    editSegments[i].color = selectedColor;
    renderSegmentList();
  }
}
function addSegment(){
  const color = selectedColor || PALETTE[Math.floor(Math.random()*PALETTE.length)];
  editSegments.push({label:'新奖项',color});
  renderSegmentList();
}
function delSegment(i){
  if(editSegments.length<=1) return;
  editSegments.splice(i,1);
  renderSegmentList();
}
function saveSegments(){
  // Validate
  const labels = editSegments.map(s=>s.label.trim()).filter(Boolean);
  if(labels.length<1){alert('至少需要一个奖项');return;}
  // Remove empty
  editSegments = editSegments.filter(s=>s.label.trim());
  segments = editSegments.map(s=>({...s}));
  localStorage.setItem('wheelSegments',JSON.stringify(segments));
  drawWheel(currentAngle);
  closeEditModal();
}

// Init
resizeCanvas();
drawWheel(currentAngle);
renderHistory();
window.addEventListener('resize',resizeCanvas);
</script>
</body>
</html>
